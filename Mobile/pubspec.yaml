name: q_play
description: "A professional sports turf booking application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Core
  provider: ^6.1.5
  shared_preferences: ^2.4.26
  http: ^1.5.0
  dio: ^5.9.2
  image_picker: ^1.2.2
  intl: ^0.20.2

  # Features
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  share_plus: ^13.1.0
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_native_splash: ^2.4.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation & DI
  go_router: ^17.3.0
  get_it: ^9.1.0

  # JSON
  json_annotation: ^4.12.0

  # Location
  geolocator: ^14.0.3
  geocoding: ^4.0.0

  # UI
  confetti: ^0.8.0
  cupertino_icons: ^1.0.8
  dropdown_search: ^7.0.0
  csc_picker: ^0.2.7

  # Database
  sqflite: ^2.4.3

  # Firebase
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  # Notifications
  flutter_local_notifications: ^22.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.15.0
  json_serializable: ^6.14.0

  # App Icons
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/no-turf-image.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android: true
  ios: true